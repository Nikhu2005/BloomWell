<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BloomWell – Welcome</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body class="auth-page">

  <div class="auth-bg">
    <div class="petal petal-1"></div>
    <div class="petal petal-2"></div>
    <div class="petal petal-3"></div>
    <div class="petal petal-4"></div>
    <div class="petal petal-5"></div>
  </div>

  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-icon">🌸</div>
      <h1 class="brand-name">BloomWell</h1>
      <p class="brand-tagline">Safe · Private · Judgment-free healthcare</p>
    </div>

    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="tab-btn {% if tab != 'register' %}active{% endif %}" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn {% if tab == 'register' %}active{% endif %}" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="login-form" class="auth-form {% if tab == 'register' %}hidden{% endif %}" method="POST" action="/login">
      <div class="field-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required/>
      </div>
      <div class="field-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required/>
      </div>
      <button type="submit" class="btn-primary">Continue Safely →</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="register-form" class="auth-form {% if tab != 'register' %}hidden{% endif %}" method="POST" action="/register">
      <div class="field-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required/>
      </div>

      <div class="anon-toggle">
        <label class="toggle-label">
          <input type="checkbox" name="anonymous" id="anon-check" checked onchange="toggleUsername(this)"/>
          <span class="toggle-track"></span>
          <span class="toggle-text">Stay Anonymous (Recommended)</span>
        </label>
        <p class="toggle-hint">We'll generate a private username — no real name needed.</p>
      </div>

      <div class="field-group" id="username-field" style="display:none">
        <label>Choose Username</label>
        <input type="text" name="username" placeholder="e.g. wellness_user"/>
      </div>

      <div class="field-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Create a strong password" required/>
      </div>

      <button type="submit" class="btn-primary">Join BloomWell 🌸</button>
    </form>

    <p class="auth-footer">Your data is encrypted. We never share your information.</p>
  </div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.add('hidden'));
  if (tab === 'login') {
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
    document.getElementById('login-form').classList.remove('hidden');
  } else {
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
    document.getElementById('register-form').classList.remove('hidden');
  }
}
function toggleUsername(cb) {
  document.getElementById('username-field').style.display = cb.checked ? 'none' : 'block';
}
</script>
</body>
</html>
